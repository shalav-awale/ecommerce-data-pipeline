name: dbt CI Pipeline

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: practice_ecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Pytest unit tests
        run: pytest tests/unit/ -v

      - name: Create ecommerce schema
        env:
          PGPASSWORD: postgres
        run: |
          psql \
            -h localhost \
            -U postgres \
            -d practice_ecommerce \
            -c "CREATE SCHEMA IF NOT EXISTS ecommerce;"

      - name: Write dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          ecommerce_pipeline:
            target: dev
            outputs:
              dev:
                type: postgres
                host: localhost
                port: 5432
                user: postgres
                password: postgres
                dbname: practice_ecommerce
                schema: ecommerce
                threads: 1
          EOF

      - name: Install dbt packages
        run: dbt deps

      - name: Run dbt build
        run: dbt build